    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { min-height: 100vh; }
    body {
      font-family: 'Inter', 'Segoe UI', system-ui, sans-serif;
      background: #F5F0EA;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 0 1rem 4rem;
      position: relative;
    }

    .top-bar {
      position: sticky;
      top: 0;
      left: 0;
      width: 100vw;
      margin-left: calc(-50vw + 50%);
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 16px 48px;
      background: #F5F0EA;
      z-index: 100;
      margin-bottom: 2.5rem;
    }
    .logo-box {
      background: #ffffff;
      width: 90px; height: 90px;
      border-radius: 16px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 32px;
      box-shadow: 0 4px 18px rgba(0,0,0,0.10);
    }
    .logo-box img { width: 90%; height: 80%; object-fit: contain; }
    .company-name {
      background: #ffffff;
      padding: 16px 28px;
      border-radius: 16px;
      font-size: 22px;
      font-weight: 700;
      color: #1B2A3B;
      letter-spacing: 0.08em;
      box-shadow: 0 4px 18px rgba(0,0,0,0.10);
    }

    .intro-line {
      display: block;
      width: 80px; height: 1px;
      background: linear-gradient(to right, transparent, #C9A96E, transparent);
      margin-bottom: 12px;
    }
    .intro-text {
      text-align: center;
      font-size: 14px;
      color: #6B6456;
      line-height: 1.7;
      max-width: 400px;
      margin-bottom: 2rem;
    }

    /* ── DUPLICATE MESSAGE ── */
    #duplicate-msg {
      display: none;
      width: 100%;
      max-width: 580px;
      background: #FFF8EC;
      border: 1.5px solid #C9A96E;
      border-radius: 12px;
      padding: 16px 20px;
      margin-bottom: 1.2rem;
      color: #7A5C1E;
      font-size: 14px;
      line-height: 1.6;
      text-align: center;
      animation: fadeIn .3s ease;
    }
    #duplicate-msg strong { display: block; font-size: 15px; margin-bottom: 4px; }
    #duplicate-msg .icon { font-size: 28px; margin-bottom: 6px; display: block; }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(-8px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    /* ── SHAKE animation on error ── */
    @keyframes shake {
      0%,100% { transform: translateX(0); }
      20%      { transform: translateX(-6px); }
      40%      { transform: translateX(6px); }
      60%      { transform: translateX(-4px); }
      80%      { transform: translateX(4px); }
    }
    .shake { animation: shake .4s ease; }

    input[type="hidden"], br { display: none; }

    form {
      background: #ffffff;
      border-radius: 16px;
      padding: 1.8rem 2rem 1.6rem;
      width: 100%;
      max-width: 580px;
      box-shadow: 0 2px 28px rgba(0,0,0,0.07);
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 0;
      font-size: 0;
    }

    form > label {
      display: block;
      font-size: 12.5px;
      font-weight: 500;
      color: #1B2A3B;
      padding-top: 16px;
      padding-bottom: 6px;
      background: #ffffff;
      letter-spacing: 0.1px;
    }
    form > label:nth-of-type(1) { grid-column:1; padding-left:0;    padding-right:10px; padding-top:0; }
    form > label:nth-of-type(2) { grid-column:2; padding-left:10px; padding-right:0;    padding-top:0; }
    form > label:nth-of-type(3) { grid-column:1; padding-left:0;    padding-right:10px; }
    form > label:nth-of-type(4) { grid-column:2; padding-left:10px; padding-right:0; }
    form > label:nth-of-type(5) { grid-column:1; padding-left:0;    padding-right:10px; }
    form > label:nth-of-type(6) { grid-column:2; padding-left:10px; padding-right:0; }
    form > label:nth-of-type(7) { grid-column:1; padding-left:0;    padding-right:10px; }
    form > label:nth-of-type(8) { grid-column:2; padding-left:10px; padding-right:0; }

    form > input[type="text"],
    form > input[type="email"] {
      display: block;
      font-size: 13.5px;
      font-family: 'Inter', 'Segoe UI', system-ui, sans-serif;
      color: #1B2A3B;
      background: #ffffff;
      border: 1px solid #E2D8CC;
      border-radius: 8px;
      outline: none;
      padding: 10px 12px 10px 38px;
      transition: border-color .15s, box-shadow .15s;
      align-self: start;
      margin-bottom: 2px;
    }
    form > input[type="text"]:focus,
    form > input[type="email"]:focus {
      border-color: #C9A96E;
      box-shadow: 0 0 0 3px rgba(201,169,110,.12);
    }
    /* highlight duplicate fields */
    form > input.duplicate-field {
      border-color: #E07B39 !important;
      box-shadow: 0 0 0 3px rgba(224,123,57,.15) !important;
    }

    form > input::placeholder { color: #BDB0A0; font-size: 13px; }

    input#first_name { grid-column:1; margin:0 10px 0 0;   width:calc(100% - 10px); }
    input#last_name  { grid-column:2; margin:0 0   0 10px; width:calc(100% - 10px); }
    input#phone      { grid-column:1; margin:0 10px 0 0;   width:calc(100% - 10px); }

    form > input[type="submit"] {
      all: unset;
      grid-column: 1 / -1;
      display: block;
      width: 100%;
      margin-top: 1.8rem;
      padding: 14px;
      background: #1B2A3B;
      color: #ffffff;
      font-size: 13px;
      font-weight: 500;
      font-family: 'Inter', 'Segoe UI', system-ui, sans-serif;
      letter-spacing: 1.5px;
      text-transform: uppercase;
      border-radius: 8px;
      cursor: pointer;
      transition: background .18s;
      text-align: center;
    }
    form > input[type="submit"]:hover  { background: #243547; }
    form > input[type="submit"]:active { background: #111D28; }
    form > input[type="submit"]:disabled {
      background: #9AA5B0;
      cursor: not-allowed;
    }

    /* Loading spinner on button */
    .btn-loading {
      position: relative;
      color: transparent !important;
    }
    .btn-loading::after {
      content: '';
      position: absolute;
      width: 18px; height: 18px;
      top: 50%; left: 50%;
      margin: -9px 0 0 -9px;
      border: 2px solid rgba(255,255,255,.3);
      border-top-color: #fff;
      border-radius: 50%;
      animation: spin .7s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    @media (max-width: 540px) {
      .top-bar { padding: 14px 20px; }
      .logo-box { width: 56px; height: 56px; font-size: 26px; }
      .company-name { font-size: 18px; padding: 12px 18px; }
      form { grid-template-columns: 1fr; padding: 1.4rem; border-radius: 12px; }
      form > label:nth-of-type(n) { grid-column:1; padding-left:0; padding-right:0; }
      input#first_name, input#last_name, input#phone, input#email, input#company, input#city {
        grid-column:1; margin:0; width:100%;
      }
      form > select#country_code, form > select#00NNS00003EWjLN {
        grid-column:1; margin:0; width:100%;
      }
    }

    //  Checks: email + phone + company
    // ══════════════════════════════════════════

    const STORAGE_KEY = 'solargroup_submissions';

    // Load existing submissions from localStorage
    function getSubmissions() {
      try {
        return JSON.parse(localStorage.getItem(STORAGE_KEY)) || [];
      } catch(e) {
        return [];
      }
    }

    // Save a new submission
    function saveSubmission(email, phone, company) {
      const submissions = getSubmissions();
      submissions.push({
        email:   email.toLowerCase().trim(),
        phone:   phone.replace(/\s/g,'').trim(),
        company: company.toLowerCase().trim(),
        date:    new Date().toISOString()
      });
      localStorage.setItem(STORAGE_KEY, JSON.stringify(submissions));
    }

    // Check if any field matches an existing submission
    function checkDuplicate(email, phone, company) {
      const submissions = getSubmissions();
      const emailClean   = email.toLowerCase().trim();
      const phoneClean   = phone.replace(/\s/g,'').trim();
      const companyClean = company.toLowerCase().trim();

      for (const s of submissions) {
        if (emailClean   && s.email   && s.email   === emailClean)   return 'email';
        if (phoneClean   && s.phone   && s.phone   === phoneClean)   return 'phone';
        if (companyClean && s.company && s.company === companyClean) return 'company';
      }
      return null;
    }

    // Show duplicate message
    function showDuplicateMsg(field) {
      const msg = document.getElementById('duplicate-msg');
      const detail = document.getElementById('duplicate-detail');

      const labels = {
        email:   'email address',
        phone:   'phone number',
        company: 'company name'
      };
      detail.textContent = labels[field] || 'email, phone number or company name';

      // Highlight the duplicate field
      ['email','phone','company'].forEach(f => {
        document.getElementById(f).classList.remove('duplicate-field');
      });
      if (field) {
        document.getElementById(field).classList.add('duplicate-field');
        document.getElementById(field).focus();
      }

      msg.style.display = 'block';
      msg.classList.remove('shake');
      void msg.offsetWidth; // reflow to restart animation
      msg.classList.add('shake');
      window.scrollTo({ top: 0, behavior: 'smooth' });
    }

    // Hide message when user edits a field
    ['email','phone','company'].forEach(id => {
      document.getElementById(id).addEventListener('input', function() {
        this.classList.remove('duplicate-field');
        document.getElementById('duplicate-msg').style.display = 'none';
      });
    });

    // Form submit handler
    document.getElementById('solar-form').addEventListener('submit', function(e) {
      e.preventDefault();

      const email   = document.getElementById('email').value;
      const phone   = document.getElementById('phone').value;
      const company = document.getElementById('company').value;

      const duplicateField = checkDuplicate(email, phone, company);

      if (duplicateField) {
        // DOUBLON DÉTECTÉ → bloquer et afficher message
        showDuplicateMsg(duplicateField);
        return;
      }

      // PAS DE DOUBLON → sauvegarder et soumettre
      saveSubmission(email, phone, company);

      // Visual feedback on button
      const btn = document.getElementById('submit-btn');
      btn.classList.add('btn-loading');
      btn.disabled = true;

      // Submit the form
      this.submit();
    });
  </script>

</body>
